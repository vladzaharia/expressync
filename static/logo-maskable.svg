<?xml version="1.0" encoding="UTF-8"?>
<!--
  ExpressCharge maskable PWA icon. The OS applies its own mask (Android
  circle, iOS squircle, etc.) so the canvas must extend past any visible
  shape and the glyph must live inside the safe zone (inner 80%, i.e. a
  circle of radius 40% of the canvas centred on the canvas centre).

  Same gradient as logo-app.svg — bleed edge to edge so the mask never
  exposes a hard corner. Thunderbolt is white with a cyan glow + lucide
  rounded joins so the launcher icon matches the app icon and the web
  glyph.
-->
<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient
      id="es-bg-mask"
      x1="0"
      y1="0"
      x2="512"
      y2="512"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#06b6d4" />
      <stop offset="0.55" stop-color="#22c55e" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="bolt-glow-mask" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow
        dx="0"
        dy="0"
        stdDeviation="4"
        flood-color="#a5f3fc"
        flood-opacity="0.95"
      />
      <feDropShadow
        dx="0"
        dy="0"
        stdDeviation="8"
        flood-color="#67e8f9"
        flood-opacity="0.7"
      />
      <feDropShadow
        dx="0"
        dy="0"
        stdDeviation="16"
        flood-color="#22d3ee"
        flood-opacity="0.45"
      />
    </filter>
  </defs>
  <!-- Full-bleed background — launcher will mask this. -->
  <rect x="0" y="0" width="512" height="512" fill="url(#es-bg-mask)" />
  <!-- Lucide Zap glyph — white + matching stroke at lucide's stroke-width=2
       with round joins/caps. 24x24 path → 320px box, offset (512-320)/2 = 96. -->
  <g
    transform="translate(96 96) scale(13.333)"
    fill="#ffffff"
    stroke="#ffffff"
    stroke-width="2"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#bolt-glow-mask)"
  >
    <path d="M13 2 L3 14 h9 l-1 8 L21 10 h-9 l1 -8 z" />
  </g>
</svg>
