<?xml version="1.0" encoding="UTF-8"?>
<!--
  ExpressCharge maskable PWA icon. The OS applies its own mask (Android
  circle, iOS squircle, etc.) so the canvas must extend past any visible
  shape and the glyph must live inside the safe zone (inner 80%, i.e. a
  circle of radius 40% of the canvas centred on the canvas centre).

  Generated to match logo.svg colours but without the inner squircle —
  the gradient bleeds edge-to-edge and the launcher masks it.
-->
<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient
      id="es-bg-mask"
      x1="0"
      y1="0"
      x2="512"
      y2="512"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#06b6d4" />
      <stop offset="0.55" stop-color="#22c55e" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Full-bleed background — launcher will mask this. -->
  <rect x="0" y="0" width="512" height="512" fill="url(#es-bg-mask)" />
  <!-- Lucide Zap glyph, scaled into the safe zone (inner 80% / 410px box,
       centred). 24x24 source path → 320px box, offset (512-320)/2 = 96. -->
  <g
    transform="translate(96 96) scale(13.333)"
    fill="#0b1b3d"
    stroke="#0b1b3d"
    stroke-width="0.6"
    stroke-linejoin="round"
  >
    <path d="M13 2 L3 14 h9 l-1 8 L21 10 h-9 l1 -8 z" />
  </g>
</svg>
