<?xml version="1.0" encoding="UTF-8"?>
<!--
  ExpresSync brand glyph — squircle with thunderbolt.
  Mirrors the inline ExpresSyncLogo in components/brand/ExpresSyncBrand.tsx
  (rounded-[30%] gradient from primary → accent, white Zap icon). Source for
  all PNG favicons / app icons via scripts/generate-favicons.ts.
-->
<svg
  width="256"
  height="256"
  viewBox="0 0 256 256"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient
      id="es-bg"
      x1="0"
      y1="0"
      x2="256"
      y2="256"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#06b6d4" />
      <stop offset="0.55" stop-color="#22c55e" />
      <stop offset="1" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Squircle (rx ≈ 30% of side, matching rounded-[30%] in the React glyph). -->
  <rect
    x="0"
    y="0"
    width="256"
    height="256"
    rx="76"
    ry="76"
    fill="url(#es-bg)"
  />
  <!-- Lucide Zap glyph, scaled and centered. 24x24 path → 144px box, offset 56px. -->
  <g
    transform="translate(56 56) scale(6)"
    fill="#0b1b3d"
    stroke="#0b1b3d"
    stroke-width="0.6"
    stroke-linejoin="round"
  >
    <path d="M13 2 L3 14 h9 l-1 8 L21 10 h-9 l1 -8 z" />
  </g>
</svg>
