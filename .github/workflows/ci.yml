name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: fmt + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task check

  test:
    name: unit + integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:ci@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: db migrate
        run: deno task db:migrate
      - name: test
        run: deno task test

  build:
    name: vite build + docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task build
      - name: docker build smoke
        run: docker build -t web:ci .

  host-dispatch-guard:
    name: host dispatch sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify host constants exist and are non-empty
        run: |
          grep -q 'ADMIN_HOSTS' utils.ts || { echo 'ADMIN_HOSTS missing'; exit 1; }
          grep -q 'CUSTOMER_HOSTS' utils.ts || { echo 'CUSTOMER_HOSTS missing'; exit 1; }

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
