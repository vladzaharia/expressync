name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: fmt + lint + typecheck
    runs-on: ubuntu-latest
    # Pre-existing lint drift (require-await, no-unused-vars, react-rules-of-hooks).
    # Informational while the codebase is tightened up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task check

  test:
    name: unit + integration tests
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:ci@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: db migrate
        run: deno task db:migrate
      - name: test
        run: deno task test

  build:
    name: build (docker smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build smoke
        run: docker build -t web:ci .

  host-dispatch-guard:
    name: host dispatch sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify host constants exist
        run: |
          grep -q 'ADMIN_HOSTS' src/lib/hostname-dispatch.ts || { echo 'ADMIN_HOSTS missing'; exit 1; }
          grep -q 'CUSTOMER_HOSTS' src/lib/hostname-dispatch.ts || { echo 'CUSTOMER_HOSTS missing'; exit 1; }

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz \
            | tar -xz gitleaks
          chmod +x gitleaks
      - name: scan
        run: ./gitleaks detect --no-banner --redact --exit-code 1
